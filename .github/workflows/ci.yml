name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm test
      - run: npm run build
      - name: Run E2E tests if any exist
        run: |
          if ls tests/e2e/*.spec.ts 2>/dev/null; then
            npx playwright install --with-deps webkit
            npm run test:e2e
          else
            echo "No E2E tests yet — skipping"
          fi
