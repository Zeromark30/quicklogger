name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Audit the FULL dependency tree (not --omit=dev): devDependencies like
      # svelte/@sveltejs/kit/devalue get compiled into the build/ bundle, so they
      # ship at runtime even though Trivy's image scan can't see them. Gate on
      # high+ to match the image gate; lower-severity advisories flow through
      # Dependabot. See docs/deployment.md § "Vulnerability scanning".
      - name: Audit dependencies (high+)
        run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run check
      - run: npm test
      - run: npm run build
      - name: Resolve Playwright version
        id: playwright
        run: echo "version=$(node -p 'require("@playwright/test/package.json").version')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright.outputs.version }}
      - name: Run E2E tests if any exist
        run: |
          if ls tests/e2e/*.spec.ts 2>/dev/null; then
            if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
              npx playwright install-deps webkit
            else
              npx playwright install --with-deps webkit
            fi
            npm run test:e2e
          else
            echo "No E2E tests yet — skipping"
          fi
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
