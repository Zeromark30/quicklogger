# compose.example.yml — fork-friendly drop-in.
# Copy to docker-compose.yml and edit env vars to point at your LubeLogger.
#
# image: this example uses `:latest` so `docker compose pull && up -d`
# always gets the newest release. If you need reproducible deploys, pin
# to a specific version like `ghcr.io/varunpan/quicklogger:0.1.3`.
services:
  quicklogger:
    image: ghcr.io/varunpan/quicklogger:latest
    restart: unless-stopped
    environment:
      LUBELOGGER_URL: http://lubelogger:8080         # change to your container/host
      LUBELOGGER_API_KEY: "${LUBELOGGER_API_KEY}"     # define in .env
      LUBELOGGER_VOLUME_UNIT: gallons_us
      LUBELOGGER_CURRENCY: USD
      FX_PROVIDERS: frankfurter,erapi,fawazahmed
      FX_CACHE_PATH: /data/fx-cache.json
      ORIGIN: https://quicklog.example.com           # set to whatever URL you serve from
      PORT: 3000
      # --- Photo OCR (v0.2.0+, optional) -----------------------------------
      # Feature activates iff at least one provider is configured. UI hides
      # the camera affordances when neither is set.
      #
      # OLLAMA_VISION_URL: http://ollama:11434
      # OLLAMA_VISION_MODEL: qwen2.5vl:7b
      # OLLAMA_VISION_TIMEOUT_MS: 60000
      # OLLAMA_KEEP_ALIVE: 30m
      #
      # OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      # OPENROUTER_VISION_MODEL: google/gemini-2.5-flash-lite
      # OPENROUTER_VISION_TIMEOUT_MS: 30000
      #
      # OCR_DAILY_BUDGET_USD: "1.00"
      # OCR_RATE_LIMIT_PER_HOUR: 20
      #
      # OCR_BUDGET_PATH: /data/ocr-budget.json
      # OCR_AUDIT_PATH: /data/ocr-audit.jsonl
      # OCR_AUDIT_KEY_PATH: /data/ocr-audit-key.txt
      # OCR_AUDIT_HMAC_KEY:                   # optional; auto-generated when unset
      #
      # OCR_PUMP_VOLUME_MAX: 200
      # OCR_PUMP_COST_MAX: 500
      # OCR_PUMP_PRICE_PER_UNIT_MAX: 20
      # OCR_ODOMETER_MAX_MI: 1000000
    volumes:
      - ./data:/data
    ports:
      - "3000:3000"   # remove if behind a reverse proxy on the same network
    networks:
      - default
    # --- Runtime hardening (drop these for permissive parity, keep them for least-privilege) ---
    read_only: true                       # root FS read-only; only /data + /tmp writable
    tmpfs:
      - /tmp:rw,size=16m,mode=1777        # ephemeral 16MB writable /tmp
    cap_drop:
      - ALL                               # HTTP server needs zero Linux capabilities
    security_opt:
      - no-new-privileges:true            # block setuid escalation paths
    pids_limit: 100                       # bound fork-bomb blast radius
    mem_limit: 256m                       # OOM-kill the container before it hurts the host
